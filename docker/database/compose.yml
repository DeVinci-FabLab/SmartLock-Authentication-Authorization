services:
  # Development service — builds from source with live volume mount
  smartlock-api-dev:
    build:
      context: ../..
      dockerfile: docker/database/Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ../../alembic/versions:/app/alembic/versions
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartlock-internal

  # Production service — pulls image built by CD pipeline
  smartlock-api:
    image: ghcr.io/devinci-fablab/smartlock-auth:latest
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    expose:
      - 8000
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - smartlock-internal
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smartlock-auth.rule=Host(`api.smartlock.devinci-fablab.fr`)"
      - "traefik.http.routers.smartlock-auth.entrypoints=websecure"
      - "traefik.http.routers.smartlock-auth.tls.certresolver=myresolver"
      - "traefik.http.services.smartlock-auth.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=true"

  postgres:
    image: postgres:15
    restart: unless-stopped
    container_name: smartlock-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${VOLUMES_PATH}/smartlock_auth/postgres_data:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartlock-internal

networks:
  smartlock-internal:
    driver: bridge
  traefik-network:
    external: true
